<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="掃碼退貨">
  <meta name="theme-color" content="#16a34a">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
  <title>掃碼退貨</title>
</head>
<body>
  <header class="top">
    <span class="top-title">↩ 掃碼退貨</span>
    <button id="settings-btn" class="gear" type="button" aria-label="設定">⚙</button>
  </header>

  <main class="main">
    <div class="scanbox">
      <input id="scan" type="text" placeholder="游標放這裡，掃描條碼…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
      <span class="count">已掃 <b id="count">0</b></span>
    </div>
    <p class="tip" id="tip">藍牙掃碼器（HID 鍵盤模式）配對後，掃描即自動加入；重複會自動略過。</p>
    <div class="list" id="list"></div>
  </main>

  <footer class="foot">
    <button id="cancel" class="btn cancel" type="button">取消</button>
    <button id="save" class="btn save" type="button">儲存</button>
    <button id="return" class="btn ret" type="button">退貨</button>
  </footer>

  <div class="modal" id="settings" hidden>
    <div class="modal-box">
      <div class="modal-head">設定 <button id="settings-close" class="x" type="button" aria-label="關閉">✕</button></div>
      <label class="lab">退貨上傳網址（公司系統 API）</label>
      <input id="endpoint" type="url" inputmode="url" placeholder="https://你的系統/api/return">
      <p class="hint">按「退貨」時，會把整份清單以 JSON（POST）送到此網址。留空則只能本地儲存。</p>
      <div class="modal-foot">
        <button id="settings-cancel" class="btn cancel" type="button">關閉</button>
        <button id="settings-save" class="btn save" type="button">儲存設定</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
